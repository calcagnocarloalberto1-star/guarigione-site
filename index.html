        scroll-behavior: smooth;
        scroll-padding-top: var(--space-16);
      }

        font-family: "Satoshi", system-ui, -apple-system, BlinkMacSystemFont,

        font-size: var(--text-base);
        line-height: 1.6;
        color: var(--color-text);
        background-color: var(--color-bg);
      }

        display: block;
        max-width: 100%;
        height: auto;
